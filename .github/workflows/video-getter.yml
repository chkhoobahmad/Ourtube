name: 02 - 🎯 دانلود ویدئو یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو ( چند لینک با فاصله )'
        required: true
        type: string
      download_subtitles:
        description: '📝 زیرنویس ( فارسی و انگلیسی )'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز ( اختیاری برای محافظت )'
        required: false
        default: ''
        type: string

jobs:
  get-video:
    name: "📥 دانلود ویدیو"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "❌ No video URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15
          echo "Checking WARP status..."
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video(s)
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER_ENV: ${{ github.repository_owner }}
          REPO_NAME_ENV: ${{ github.event.repository.name }}
          BRANCH_ENV: ${{ github.ref_name }}
        run: |
          # ── SETUP ────────────────────────────────
          REPO_OWNER="${REPO_OWNER_ENV}"
          REPO_NAME="${REPO_NAME_ENV}"
          BRANCH="${BRANCH_ENV}"
          URLS_RAW="${YT_URLS}"
          read -ra URL_LIST <<< "$URLS_RAW"
          TOTAL_URLS=${#URL_LIST[@]}
          QUALITY="${YT_QUALITY}"
          ZIP_PASSWORD="${YT_PASSWORD}"
          DOWNLOAD_SUBS="${{ github.event.inputs.download_subtitles }}"
          SPLIT_MB=95
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR"
          mkdir -p videos
          > /tmp/video_info.txt

          echo "Total URLs to download: $TOTAL_URLS"
          echo "Quality: $QUALITY"

          # ── FUNCTIONS ────────────────────────────────
          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'
          }
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          # تابع بهینه‌سازی برای اندروید
          optimize_for_android() {
            local input_file="$1"
            local output_file="$2"
            
            local video_codec=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$input_file" 2>/dev/null || echo "unknown")
            
            if [ "$video_codec" = "h264" ] || [ "$video_codec" = "avc1" ]; then
              echo "  ✓ Already H.264, skipping optimization"
              cp "$input_file" "$output_file"
              return 0
            fi
            
            echo "  🔄 Converting $video_codec to H.264..."
            ffmpeg -i "$input_file" \
              -c:v libx264 -preset fast -crf 23 \
              -c:a aac -b:a 128k \
              -movflags +faststart -pix_fmt yuv420p \
              -y "$output_file" 2>/dev/null
            
            if [ $? -eq 0 ] && [ -f "$output_file" ]; then
              echo "  ✅ Optimization complete"
              return 0
            else
              echo "  ⚠️ Optimization failed, using original"
              cp "$input_file" "$output_file"
              return 1
            fi
          }

          case "$QUALITY" in
            "audio") FORMAT="bestaudio/bestaudio*/best";;
            "best") FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
            "2160"|"4k") FORMAT="bestvideo[height<=2160]+bestaudio/bestvideo[height<=2160]*+bestaudio*/bestvideo+bestaudio/best";;
            "1440"|"2k") FORMAT="bestvideo[height<=1440]+bestaudio/bestvideo[height<=1440]*+bestaudio*/bestvideo+bestaudio/best";;
            "1080") FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo[height<=1080]*+bestaudio*/bestvideo+bestaudio/best";;
            "720") FORMAT="bestvideo[height<=720]+bestaudio/bestvideo[height<=720]*+bestaudio*/bestvideo+bestaudio/best";;
            "480") FORMAT="bestvideo[height<=480]+bestaudio/bestvideo[height<=480]*+bestaudio*/bestvideo+bestaudio/best";;
            *) FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
          esac
          
          download_video() {
            local METHOD=$1; local URL=$2; local TMP_DIR=$3;
            echo "  Method $METHOD..."
            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --progress --newline --quiet --no-progress"
            elif [ "$QUALITY" = "best" ]; then
              COMMON_FLAGS="--merge-output-format mp4 --format-sort res,+codec:vp9.1,+size --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --progress --newline --quiet --no-progress"
            else
              COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --progress --newline --quiet --no-progress"
            fi
            case $METHOD in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "$URL" 2>&1 | grep -E "(Downloading|Merging|has already been downloaded|Destination)" || true;;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "$URL" 2>&1 | grep -E "(Downloading|Merging|has already been downloaded|Destination)" || true;;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github "$URL" 2>&1 | grep -E "(Downloading|Merging|has already been downloaded|Destination)" || true;;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL" 2>&1 | grep -E "(Downloading|Merging|has already been downloaded|Destination)" || true;;
              5) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android_vr" "$URL" 2>&1 | grep -E "(Downloading|Merging|has already been downloaded|Destination)" || true;;
              6) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL" 2>&1 | grep -E "(Downloading|Merging|has already been downloaded|Destination)" || true;;
              7) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL" 2>&1 | grep -E "(Downloading|Merging|has already been downloaded|Destination)" || true;;
              8) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36" "$URL" 2>&1 | grep -E "(Downloading|Merging|has already been downloaded|Destination)" || true;;
            esac
            return ${PIPESTATUS[0]}
          }
          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")
          get_random_word() { echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"; }
          get_unique_folder() {
            local BASE_PATH="$1"; local NAME="$2";
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then echo "$NAME"; return; fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do RANDOM_SUFFIX=$(get_random_word); done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }
          normalize_youtube_url() {
            local INPUT_URL="$1"
            if [[ "$INPUT_URL" =~ youtu\.be/([a-zA-Z0-9_-]+) ]]; then
              VIDEO_ID="${BASH_REMATCH[1]}"; VIDEO_ID="${VIDEO_ID%%\?*}";
              echo "https://www.youtube.com/watch?v=${VIDEO_ID}"
            else
              echo "$INPUT_URL"
            fi
          }

          # ── MAIN LOOP ────────────────────────────────
          URL_INDEX=0
          for URL in "${URL_LIST[@]}"; do
            URL_INDEX=$((URL_INDEX + 1))
            URL=$(normalize_youtube_url "$URL")
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📹 [$URL_INDEX/$TOTAL_URLS] Processing: $URL"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            TMP_DIR="tmp_downloads_${URL_INDEX}"
            mkdir -p "$TMP_DIR"
            DOWNLOAD_SUCCESS=false
            
            for METHOD in 1 2 3 4 5 6 7 8; do
              if download_video $METHOD "$URL" "$TMP_DIR"; then
                echo "  ✅ Download successful with method $METHOD!"
                QUALITY_OK=true
                if [ "$QUALITY" != "best" ] && [ "$QUALITY" != "audio" ]; then
                  for DOWNLOADED_FILE in "$TMP_DIR"/*.mp4 "$TMP_DIR"/*.webm "$TMP_DIR"/*.mkv; do
                    [ -f "$DOWNLOADED_FILE" ] || continue
                    ACTUAL_HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 "$DOWNLOADED_FILE" 2>/dev/null || echo "unknown")
                    if [ "$ACTUAL_HEIGHT" != "unknown" ] && [ "$ACTUAL_HEIGHT" -lt $(( QUALITY - 150 )) ] 2>/dev/null; then
                      echo "  ⚠️ Got ${ACTUAL_HEIGHT}p instead of ${QUALITY}p — retrying..."
                      QUALITY_OK=false; rm -f "$DOWNLOADED_FILE";
                    fi
                  done
                fi
                if [ "$QUALITY_OK" = true ]; then DOWNLOAD_SUCCESS=true; break; fi
              fi
            done
            
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "  ❌ All methods failed for: $URL — skipping"
              rm -rf "$TMP_DIR"
              continue
            fi
            
            find "$TMP_DIR" -name "*.part" -delete
            
            for FILE in "$TMP_DIR"/*; do
              [ -f "$FILE" ] || continue
              if [[ "$FILE" == *.jpg ]] || [[ "$FILE" == *.webp ]]; then continue; fi
              
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              FILENAME_NO_EXT="${BASENAME%.*}"
              EXT="${BASENAME##*.}"
              FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")
              FINAL_FOLDER_NAME=$(get_unique_folder "videos" "$FILENAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"
              
              THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
              if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then 
                cp "$THUMB_FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg"
              fi
              
              echo "${FILENAME_NO_EXT}|${FINAL_FOLDER_NAME}" >> /tmp/video_info.txt
              FOLDER_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}")
              
              # بهینه‌سازی
              FINAL_FILE="$FILE"
              if [ "$QUALITY" != "audio" ]; then
                echo "  🎬 Optimizing video for Android..."
                OPTIMIZED_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/temp_optimized.mp4"
                if optimize_for_android "$FILE" "$OPTIMIZED_FILE"; then
                  FINAL_FILE="$OPTIMIZED_FILE"
                fi
              fi
              
              SIZE=$(stat -c%s "$FINAL_FILE")
              SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
              echo "  📦 File size: ${SIZE_MB} MB"
              
              if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
                echo "  📂 Creating split archive (${SPLIT_MB}MB parts)..."
                ARCHIVE_BASE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}"
                if [ -n "$ZIP_PASSWORD" ]; then
                  7z a -tzip -v${SPLIT_MB}m -p"${ZIP_PASSWORD}" -mx=0 "${ARCHIVE_BASE}.zip" "$FINAL_FILE" > /dev/null 2>&1
                else
                  zip -0 -s ${SPLIT_MB}m "${ARCHIVE_BASE}.zip" "$FINAL_FILE" > /dev/null 2>&1
                fi
                
                PART_COUNT=$(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | wc -l)
                echo "  ✅ Created $PART_COUNT parts"

                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                for part_file in $(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | sort -V); do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                  fi
                done

                MAIN_ZIP="${FINAL_FOLDER_NAME}.zip"
                README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${FILENAME_NO_EXT}"
                  printf '%s\n' ""
                  if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                    printf '%s\n' "<div align=\"center\"><img src=\"thumbnail.jpg\" width=\"250\" /></div>"
                    printf '%s\n' ""
                  fi
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Video Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                  printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                  printf '%s\n' "| **Total Size** | **${PART_COUNT} parts** |"
                  printf '%s\n' "| **Quality** | **${QUALITY}** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password** | **YES** |"
                  else
                    printf '%s\n' "| **Password** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "## Download Links"
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS_MD}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' "*[AVASAM.IR](https://avasam.ir)*"
                } > "$README_FILE"

              else
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "  🔒 Creating password-protected archive..."
                  zip -0 -P "${ZIP_PASSWORD}" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.zip" "$FINAL_FILE" > /dev/null 2>&1
                  FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.zip")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"
                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""
                    if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                      printf '%s\n' "<div align=\"center\"><img src=\"thumbnail.jpg\" width=\"250\" /></div>"
                      printf '%s\n' ""
                    fi
                    printf '%s\n' "---"
                    printf '%s\n' "| **Video** | ${FILENAME_NO_EXT} |"
                    printf '%s\n' "| **Link** | [YouTube](${URL}) |"
                    printf '%s\n' "| **Size** | ${SIZE_MB} MB |"
                    printf '%s\n' "| **Quality** | ${QUALITY} |"
                    printf '%s\n' "| **Password** | YES |"
                    printf '%s\n' ""
                    printf '%s\n' "📥 [Download](${RAW_LINK})"
                    printf '%s\n' ""
                    printf '%s\n' "*[AVASAM.IR](https://avasam.ir)*"
                  } > "$README_FILE"
                else
                  echo "  📁 Copying file..."
                  cp "$FINAL_FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.${EXT}"
                  FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.${EXT}")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"
                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""
                    if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                      printf '%s\n' "<div align=\"center\"><img src=\"thumbnail.jpg\" width=\"250\" /></div>"
                      printf '%s\n' ""
                    fi
                    printf '%s\n' "---"
                    printf '%s\n' "| **Video** | ${FILENAME_NO_EXT} |"
                    printf '%s\n' "| **Link** | [YouTube](${URL}) |"
                    printf '%s\n' "| **Size** | ${SIZE_MB} MB |"
                    printf '%s\n' "| **Quality** | ${QUALITY} |"
                    printf '%s\n' ""
                    printf '%s\n' "📥 [Download](${RAW_LINK})"
                    printf '%s\n' ""
                    printf '%s\n' "*[AVASAM.IR](https://avasam.ir)*"
                  } > "$README_FILE"
                fi
              fi
              echo "  ✅ Ready: ${FILENAME_NO_EXT}"
              rm -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/temp_optimized.mp4" 2>/dev/null || true
            done
            rm -rf "$TMP_DIR"
          done
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          echo "REPO_OWNER_ENV=${REPO_OWNER_ENV}" > /tmp/env_vars.txt
          echo "REPO_NAME_ENV=${REPO_NAME_ENV}" >> /tmp/env_vars.txt
          echo "BRANCH_ENV=${BRANCH_ENV}" >> /tmp/env_vars.txt
          printf "%s\n" "${URL_LIST[@]}" > /tmp/yt_urls.txt
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All downloads completed!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          set +e
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          source /tmp/env_vars.txt
          REPO_OWNER=${REPO_OWNER_ENV}
          REPO_NAME=${REPO_NAME_ENV}
          BRANCH=${BRANCH_ENV}
          mapfile -t URL_LIST < /tmp/yt_urls.txt

          sub_download() {
            local MODE=$1; local OUT="$2"; local SURL="$3";
            local SUB_DIR=$(dirname "$OUT")
            sub_count() { find "$SUB_DIR" -type f \( -name "*.vtt" -o -name "*.srt" \) 2>/dev/null | wc -l; }
            fa_count()  { find "$SUB_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l; }
            en_count()  { find "$SUB_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l; }
            sub_flags() {
              case $MODE in
                all)        echo "--write-sub --sub-langs fa,en";;
                fa-native)  echo "--write-sub --sub-langs fa";;
                fa-auto)    echo "--write-auto-sub --sub-langs fa";;
                en-auto)    echo "--write-auto-sub --sub-langs en";;
                auto-both)  echo "--write-auto-sub --sub-langs en,fa";;
              esac
            }
            SFLAGS=$(sub_flags)
            COMMON_SUB="--sub-format vtt/srt/best --convert-subs vtt --skip-download --no-playlist --no-check-certificates --output ${OUT} --quiet --no-progress"
            for METHOD in 1 2 3 4 5 6 7 8; do
              case $METHOD in
                 1) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 | grep -E "(Downloading|subtitle)" || true;;
                 2) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm $SFLAGS $COMMON_SUB "$SURL" 2>&1 | grep -E "(Downloading|subtitle)" || true;;
                 3) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 | grep -E "(Downloading|subtitle)" || true;;
                 4) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 | grep -E "(Downloading|subtitle)" || true;;
                 5) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android_vr" $SFLAGS $COMMON_SUB "$SURL" 2>&1 | grep -E "(Downloading|subtitle)" || true;;
                 6) yt-dlp --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 | grep -E "(Downloading|subtitle)" || true;;
                 7) yt-dlp --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 | grep -E "(Downloading|subtitle)" || true;;
                 8) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android" $SFLAGS $COMMON_SUB "$SURL" 2>&1 | grep -E "(Downloading|subtitle)" || true;;
              esac
              if [ "$MODE" = "fa-native" ] || [ "$MODE" = "fa-auto" ]; then
                [ "$(fa_count)" -gt 0 ] && return 0
              elif [ "$MODE" = "en-auto" ]; then
                [ "$(en_count)" -gt 0 ] && return 0
              elif [ "$MODE" = "auto-both" ]; then
                [ "$(en_count)" -gt 0 ] && [ "$(fa_count)" -gt 0 ] && return 0
              else
                [ "$(sub_count)" -gt 0 ] && return 0
              fi
            done
            return 1
          }

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📝 Downloading subtitles..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          URL_INDEX=0
          while IFS='|' read -r ORIGINAL_NAME FOLDER_NAME; do
            URL_INDEX=$((URL_INDEX + 1)); URL="${URL_LIST[$((URL_INDEX - 1))]}";
            [ -z "$FOLDER_NAME" ] && continue
            SUBTITLE_DIR="$BACKUP_DIR/${FOLDER_NAME}/subtitle"; mkdir -p "$SUBTITLE_DIR";
            OUT_TMPL="${SUBTITLE_DIR}/%(title)s"
            echo "[$URL_INDEX] Processing: $FOLDER_NAME"
            sub_download "all" "$OUT_TMPL" "$URL" || true
            EN_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l)
            FA_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l)
            if [ "$EN_COUNT" -eq 0 ] || [ "$FA_COUNT" -eq 0 ]; then
              sub_download "auto-both" "$OUT_TMPL" "$URL" || true
            fi
            SUB_COUNT=$(find "$SUBTITLE_DIR" -type f 2>/dev/null | wc -l)
            if [ "$SUB_COUNT" -eq 0 ]; then
              echo "  ℹ️ No subtitles available"
              rmdir "$SUBTITLE_DIR" 2>/dev/null || true
            else
              echo "  ✅ Found $SUB_COUNT subtitle(s)"
              ZIP_PATH="$BACKUP_DIR/${FOLDER_NAME}/subtitle.zip"
              (cd "$SUBTITLE_DIR" && zip -j "$ZIP_PATH" ./* > /dev/null 2>&1)
              rm -rf "$SUBTITLE_DIR"
              echo "  📦 Created subtitle.zip"
            fi
          done < /tmp/video_info.txt
          echo ""
          echo "✅ Subtitles completed"
          exit 0

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Incremental Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          source /tmp/env_vars.txt
          REPO_OWNER=${REPO_OWNER_ENV}
          REPO_NAME=${REPO_NAME_ENV}
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            echo "No files to push."
            exit 0
          fi          regenerate_master_readme() {
            MASTER_README="videos/README.md"
            { echo "# DOWNLOADED VIDEOS"; echo ""; echo "---"; echo ""; } > "$MASTER_README"
            NUM=0
            for folder in videos/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue
              NUM=$((NUM + 1))
              FOLDER_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FOLDER_NAME")
              FOLDER_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${FOLDER_ENCODED}"
              printf -- "- %s - 🎬 [%s](%s)\n" "$NUM" "$FOLDER_NAME" "$FOLDER_LINK" >> "$MASTER_README"
            done
          }

          git fetch origin "$BRANCH" || true
          git reset --hard origin/"$BRANCH" || true
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/ 2>/dev/null || true

          git add -f videos/ 2>/dev/null || true
          regenerate_master_readme
          git add -f videos/README.md 2>/dev/null || true

          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "[AVASAM] YouTube download [skip ci]" || true
            git push origin HEAD:"$BRANCH" || true
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All files pushed successfully!"
          echo "🎬 Videos optimized for Android VLC"
          echo "made in AVASAM (https://avasam.ir)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
