|----------|-------|
| **Video Name** | `{filename_no_ext}` |
| **Channel** | `{channel_name}` |
| **Original Link** | [YouTube Video]({video_url}) |
| **Total Size** | **{part_count} parts** - **{total_size_mb:.2f} MB** |
| **Quality** | **{QUALITY}** |
| **Status** | **Complete (100%)** |
| **Password Protected** | **{'YES' if ZIP_PASSWORD else 'NO'}** |

