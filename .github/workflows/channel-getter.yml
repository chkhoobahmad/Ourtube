name: 02 - 🎯 دانلود کل کانال یوتیوب

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: '🔗 لینک کانال یوتیوب'
        required: true
        type: string
      max_videos:
        description: '📊 حداکثر تعداد ویدیو (0=همه)'
        required: false
        default: '0'
        type: string
      download_subtitles:
        description: '📝 زیرنویس'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز'
        required: false
        default: ''
        type: string

jobs:
  download-channel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Check Channel URL
        run: |
          if [ -z "${{ github.event.inputs.channel_url }}" ]; then
            echo "No channel URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Start WARP
        run: |
          docker network create warp-net || true
          docker run -d --name warp --restart=always --network warp-net -p 1080:1080 --cap-add NET_ADMIN caomingjun/warp
          sleep 15

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          pip3 install --upgrade yt-dlp

      - name: Download Channel Videos
        env:
          CHANNEL_URL: ${{ github.event.inputs.channel_url }}
          MAX_VIDEOS: ${{ github.event.inputs.max_videos }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          DOWNLOAD_SUBS: ${{ github.event.inputs.download_subtitles }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          cat > /tmp/download.py << 'SCRIPT'
#!/usr/bin/env python3
import subprocess, os, re, sys, time, shutil
from pathlib import Path

CHANNEL_URL = os.environ.get('CHANNEL_URL', '')
MAX_VIDEOS = int(os.environ.get('MAX_VIDEOS', '0')) if os.environ.get('MAX_VIDEOS', '0') != '0' else None
QUALITY = os.environ.get('YT_QUALITY', 'best')
ZIP_PASSWORD = os.environ.get('YT_PASSWORD', '')
REPO_OWNER = os.environ.get('REPO_OWNER', '')
REPO_NAME = os.environ.get('REPO_NAME', '')
BRANCH = os.environ.get('BRANCH', '')

SPLIT_MB = 95
BACKUP_DIR = f"/tmp/video_backup_{os.getpid()}"
os.makedirs(BACKUP_DIR, exist_ok=True)
os.makedirs("videos", exist_ok=True)

def sanitize(name, max_len=80):
    name = name.replace(' ', '-')
    name = re.sub(r'[\\/:*?"<>|]', '_', name)
    name = re.sub(r'[-_]+', '-', name).strip('-_')
    return name[:max_len] if len(name) > max_len else name

def get_format():
    if QUALITY == "audio": return "bestaudio/best"
    if QUALITY == "best": return "bestvideo+bestaudio/best"
    return f"bestvideo[height<={QUALITY}]+bestaudio/best"

print(f"Channel: {CHANNEL_URL}")

# Get channel name
channel_name = ""
for proxy in [True, False]:
    proxy_flag = ['--proxy', 'socks5://127.0.0.1:1080'] if proxy else []
    try:
        result = subprocess.run(['yt-dlp'] + proxy_flag + ['--print', '%(channel)s', CHANNEL_URL], capture_output=True, text=True, timeout=30)
        if result.stdout.strip():
            channel_name = result.stdout.strip()
            break
    except: pass

if not channel_name:
    match = re.search(r'@([^/?]+)', CHANNEL_URL)
    channel_name = match.group(1) if match else "channel"

channel_name = re.sub(r'[^a-zA-Z0-9]', '_', channel_name)[:40]
print(f"Channel name: {channel_name}")

CHANNEL_DIR = f"videos/{channel_name}"
BACKUP_CHANNEL_DIR = f"{BACKUP_DIR}/{channel_name}"
os.makedirs(CHANNEL_DIR, exist_ok=True)
os.makedirs(BACKUP_CHANNEL_DIR, exist_ok=True)

# Get video list
video_urls = []
for proxy in [True, False]:
    proxy_flag = ['--proxy', 'socks5://127.0.0.1:1080'] if proxy else []
    cmd = ['yt-dlp'] + proxy_flag + ['--flat-playlist', '--print', '%(url)s', CHANNEL_URL]
    if MAX_VIDEOS:
        cmd.extend(['--max-downloads', str(MAX_VIDEOS)])
    try:
        result = subprocess.run(cmd, capture_output=True, text=True, timeout=60)
        if result.stdout.strip():
            video_urls = [u.strip() for u in result.stdout.strip().split('\n') if u.strip()]
            if video_urls:
                break
    except: pass

print(f"Found {len(video_urls)} videos")
if not video_urls:
    sys.exit(1)

video_info_file = "/tmp/video_info.txt"
open(video_info_file, 'w').close()

# Download each video
for idx, url in enumerate(video_urls, 1):
    print(f"\n{'='*50} Video {idx}/{len(video_urls)} {'='*50}")
    tmp_dir = f"/tmp/video_{idx}"
    os.makedirs(tmp_dir, exist_ok=True)
    
    fmt = get_format()
    success = False
    
    for method in range(1, 5):
        print(f"  Method {method}...")
        proxy_flag = ['--proxy', 'socks5://127.0.0.1:1080'] if method % 2 == 1 else []
        cmd = ['yt-dlp'] + proxy_flag + [
            '-f', fmt, '-o', f'{tmp_dir}/%(title)s.%(ext)s',
            '--write-thumbnail', '--convert-thumbnails', 'jpg',
            '--merge-output-format', 'mp4', '--no-playlist',
            '--retries', '3', '--no-check-certificates', url
        ]
        if QUALITY == "audio":
            cmd = ['yt-dlp'] + proxy_flag + ['-f', 'bestaudio', '--extract-audio', '--audio-format', 'mp3', '-o', f'{tmp_dir}/%(title)s.%(ext)s', '--no-playlist', url]
        
        result = subprocess.run(cmd, capture_output=True, text=True)
        if result.returncode == 0:
            success = True
            print(f"  Success!")
            break
        time.sleep(2)
    
    if not success:
        print(f"  Failed!")
        shutil.rmtree(tmp_dir, ignore_errors=True)
        continue
    
    # Process files
    for file in Path(tmp_dir).iterdir():
        if file.is_file() and file.suffix.lower() not in ['.jpg', '.webp']:
            video_name = sanitize(file.stem)
            folder_name = video_name
            
            # Unique folder
            counter = 1
            while (Path(BACKUP_CHANNEL_DIR) / folder_name).exists():
                folder_name = f"{video_name}_{counter}"
                counter += 1
            
            video_dir = Path(BACKUP_CHANNEL_DIR) / folder_name
            video_dir.mkdir(parents=True)
            
            # Thumbnail
            thumb = list(Path(tmp_dir).glob("*.jpg"))
            if thumb:
                shutil.copy(thumb[0], video_dir / "thumbnail.jpg")
            
            # Save info
            with open(video_info_file, 'a') as f:
                f.write(f"{url}|{video_name}|{folder_name}\n")
            
            size_mb = file.stat().st_size / 1024 / 1024
            
            if ZIP_PASSWORD:
                zip_path = video_dir / f"{folder_name}.zip"
                subprocess.run(['zip', '-0', '-P', ZIP_PASSWORD, str(zip_path), str(file)], capture_output=True)
                file_link = f"https://raw.githubusercontent.com/{REPO_OWNER}/{REPO_NAME}/{BRANCH}/videos/{channel_name}/{folder_name}/{folder_name}.zip"
            else:
                ext = file.suffix[1:]
                shutil.copy(file, video_dir / f"{folder_name}.{ext}")
                file_link = f"https://raw.githubusercontent.com/{REPO_OWNER}/{REPO_NAME}/{BRANCH}/videos/{channel_name}/{folder_name}/{folder_name}.{ext}"
            
            # Create README
            readme = f"""# {video_name}

<img src="thumbnail.jpg" width="250" />

---

**Channel:** {channel_name}  
**Original:** [Watch on YouTube]({url})  
**Size:** {size_mb:.1f} MB  
**Quality:** {QUALITY}  
**Password:** {'YES' if ZIP_PASSWORD else 'NO'}

## Download

[Download File]({file_link})

---
*AVASAM (https://avasam.ir)*
"""
            (video_dir / "README.md").write_text(readme, encoding='utf-8')
            print(f"  Saved: {folder_name} ({size_mb:.1f} MB)")
    
    shutil.rmtree(tmp_dir, ignore_errors=True)

# Save for next steps
with open("/tmp/backup_dir_path.txt", "w") as f:
    f.write(BACKUP_DIR)
with open("/tmp/env_vars.txt", "w") as f:
    f.write(f"REPO_OWNER={REPO_OWNER}\nREPO_NAME={REPO_NAME}\nBRANCH={BRANCH}\nCHANNEL_NAME={channel_name}")

print(f"\n{'='*50} COMPLETE! {len(video_urls)} videos {'='*50}")
SCRIPT
          python3 /tmp/download.py

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          cat > /tmp/subs.py << 'SUBS'
#!/usr/bin/env python3
import subprocess, os, shutil
from pathlib import Path

with open("/tmp/backup_dir_path.txt", "r") as f:
    BACKUP_DIR = f.read().strip()
with open("/tmp/env_vars.txt", "r") as f:
    for line in f:
        if '=' in line:
            k, v = line.strip().split('=', 1)
            os.environ[k] = v

REPO_OWNER = os.environ.get('REPO_OWNER', '')
REPO_NAME = os.environ.get('REPO_NAME', '')
BRANCH = os.environ.get('BRANCH', '')
CHANNEL_NAME = os.environ.get('CHANNEL_NAME', '')
BACKUP_CHANNEL_DIR = f"{BACKUP_DIR}/{CHANNEL_NAME}"
video_info_file = "/tmp/video_info.txt"

with open(video_info_file, 'r') as f:
    for line in f:
        parts = line.strip().split('|')
        if len(parts) != 3:
            continue
        url, name, folder = parts
        print(f"\n{'='*40} {name} {'='*40}")
        
        sub_dir = Path(BACKUP_CHANNEL_DIR) / folder / "subtitle"
        sub_dir.mkdir(parents=True, exist_ok=True)
        
        for proxy in [True, False]:
            proxy_flag = ['--proxy', 'socks5://127.0.0.1:1080'] if proxy else []
            cmd = ['yt-dlp'] + proxy_flag + ['--write-sub', '--sub-langs', 'fa,en', '--sub-format', 'vtt', '--skip-download', '--no-playlist', '-o', f'{sub_dir}/%(title)s.%(ext)s', url]
            subprocess.run(cmd, capture_output=True)
        
        sub_files = list(sub_dir.glob('*'))
        if not sub_files:
            sub_dir.rmdir()
            print("  No subtitles")
            continue
        
        print(f"  Found {len(sub_files)} files")
        zip_path = Path(BACKUP_CHANNEL_DIR) / folder / "subtitle.zip"
        subprocess.run(f'cd {sub_dir} && zip -j {zip_path} ./*', shell=True, capture_output=True)
        
        if zip_path.exists():
            shutil.rmtree(sub_dir)
            print(f"  Created subtitle.zip ({zip_path.stat().st_size / 1024:.0f} KB)")
            
            # Update README
            readme_path = Path(BACKUP_CHANNEL_DIR) / folder / "README.md"
            if readme_path.exists():
                content = readme_path.read_text(encoding='utf-8')
                sub_link = f"https://raw.githubusercontent.com/{REPO_OWNER}/{REPO_NAME}/{BRANCH}/videos/{CHANNEL_NAME}/{folder}/subtitle.zip"
                content += f"\n\n## Subtitles\n\n[Download subtitle.zip]({sub_link})\n"
                readme_path.write_text(content, encoding='utf-8')
SUBS
          python3 /tmp/subs.py

      - name: Stop WARP
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Commit & Push
        run: |
          source /tmp/env_vars.txt
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          
          if [ ! -d "$BACKUP_DIR" ] || [ -z "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
            echo "No files to push"
            exit 0
          fi
          
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          
          mkdir -p videos
          cp -r $BACKUP_DIR/* videos/
          
          git add -f videos/
          
          # Master README
          {
            echo "# 📺 Downloaded Channels"
            echo ""
            echo "---"
            echo ""
          } > videos/README.md
          
          for channel in videos/*/; do
            if [ -d "$channel" ]; then
              ch_name=$(basename "$channel")
              video_count=$(find "$channel" -mindepth 1 -maxdepth 1 -type d | wc -l)
              echo "- **$ch_name** - $video_count videos" >> videos/README.md
            fi
          done
          
          git add -f videos/README.md
          
          if ! git diff --cached --quiet; then
            git commit -m "[AVASAM] Download channel: $CHANNEL_NAME [skip ci]"
            git push origin HEAD:${{ github.ref_name }} || true
            echo "Push completed!"
          else
            echo "Nothing to commit"
          fi
          
          echo "Channel: $CHANNEL_NAME"
          echo "Done!"
