name: 02 - 🎯 دانلود کل کانال یوتیوب

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: '🔗 لینک کانال یوتیوب (مثال: https://www.youtube.com/@ChannelName)'
        required: true
        type: string
      max_videos:
        description: '📊 حداکثر تعداد ویدیو برای دانلود (پیش‌فرض: همه)'
        required: false
        default: '0'
        type: string
      download_subtitles:
        description: '📝 زیرنویس ( فارسی و انگلیسی )'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز ( اختیاری برای محافظت )'
        required: false
        default: ''
        type: string

jobs:
  download-channel:
    name: "📥 دانلود کل کانال"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Check Channel URL provided
        run: |
          if [ -z "${{ github.event.inputs.channel_url }}" ]; then
            echo "❌ No channel URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15
          echo "Checking WARP status..."
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version
          pip3 install --upgrade yt-dlp

      - name: Get Channel Info & Download All Videos
        env:
          CHANNEL_URL: ${{ github.event.inputs.channel_url }}
          MAX_VIDEOS: ${{ github.event.inputs.max_videos }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER_ENV: ${{ github.repository_owner }}
          REPO_NAME_ENV: ${{ github.event.repository.name }}
          BRANCH_ENV: ${{ github.ref_name }}
        run: |
          # ── SETUP ────────────────────────────────
          REPO_OWNER="${REPO_OWNER_ENV}"
          REPO_NAME="${REPO_NAME_ENV}"
          BRANCH="${BRANCH_ENV}"
          CHANNEL_URL="${CHANNEL_URL}"
          QUALITY="${YT_QUALITY}"
          ZIP_PASSWORD="${YT_PASSWORD}"
          DOWNLOAD_SUBS="${{ github.event.inputs.download_subtitles }}"
          SPLIT_MB=95
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR"
          mkdir -p videos
          > /tmp/video_info.txt
          > /tmp/channel_videos.txt

          echo "Channel URL: $CHANNEL_URL"
          echo "Quality: $QUALITY"
          if [ "$MAX_VIDEOS" != "0" ] && [ -n "$MAX_VIDEOS" ]; then
            echo "Max videos: $MAX_VIDEOS"
          else
            echo "Max videos: ALL"
          fi

          # ── دریافت نام کانال ────────────────────────────────
          echo "Getting channel name..."
          CHANNEL_NAME=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --quiet --print "%(channel)s" "$CHANNEL_URL" 2>/dev/null | head -1)
          if [ -z "$CHANNEL_NAME" ]; then
            CHANNEL_NAME=$(yt-dlp --quiet --print "%(channel)s" "$CHANNEL_URL" 2>/dev/null | head -1)
          fi
          if [ -z "$CHANNEL_NAME" ]; then
            CHANNEL_NAME=$(echo "$CHANNEL_URL" | sed 's/.*@//' | sed 's/\/.*//')
          fi
          CHANNEL_NAME=$(echo "$CHANNEL_NAME" | sed 's/[^a-zA-Z0-9آ-ی_-]/_/g' | sed 's/__*/_/g' | sed 's/^_//;s/_$//')
          echo "Channel name: $CHANNEL_NAME"
          
          # ── ایجاد پوشه اصلی کانال ────────────────────────────────
          CHANNEL_DIR="videos/${CHANNEL_NAME}"
          BACKUP_CHANNEL_DIR="$BACKUP_DIR/${CHANNEL_NAME}"
          mkdir -p "$CHANNEL_DIR"
          mkdir -p "$BACKUP_CHANNEL_DIR"
          
          # ── دریافت لیست ویدیوهای کانال ────────────────────────────────
          echo "Fetching video list from channel..."
          if [ "$MAX_VIDEOS" != "0" ] && [ -n "$MAX_VIDEOS" ]; then
            yt-dlp --proxy "socks5://127.0.0.1:1080" --flat-playlist --print "%(url)s" --max-downloads "$MAX_VIDEOS" "$CHANNEL_URL" > /tmp/channel_videos.txt 2>/dev/null
            if [ ! -s /tmp/channel_videos.txt ]; then
              yt-dlp --flat-playlist --print "%(url)s" --max-downloads "$MAX_VIDEOS" "$CHANNEL_URL" > /tmp/channel_videos.txt 2>/dev/null
            fi
          else
            yt-dlp --proxy "socks5://127.0.0.1:1080" --flat-playlist --print "%(url)s" "$CHANNEL_URL" > /tmp/channel_videos.txt 2>/dev/null
            if [ ! -s /tmp/channel_videos.txt ]; then
              yt-dlp --flat-playlist --print "%(url)s" "$CHANNEL_URL" > /tmp/channel_videos.txt 2>/dev/null
            fi
          fi
          
          TOTAL_VIDEOS=$(wc -l < /tmp/channel_videos.txt)
          echo "Total videos found: $TOTAL_VIDEOS"
          
          if [ "$TOTAL_VIDEOS" -eq 0 ]; then
            echo "❌ No videos found in channel!"
            exit 1
          fi
          
          # ── FUNCTIONS ────────────────────────────────
          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-' | sed 's/[\\/:*?"<>|]/_/g'
          }
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          case "$QUALITY" in
            "audio") FORMAT="bestaudio/bestaudio*/best";;
            "best") FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
            "2160"|"4k") FORMAT="bestvideo[height<=2160]+bestaudio/bestvideo[height<=2160]*+bestaudio*/bestvideo+bestaudio/best";;
            "1440"|"2k") FORMAT="bestvideo[height<=1440]+bestaudio/bestvideo[height<=1440]*+bestaudio*/bestvideo+bestaudio/best";;
            "1080") FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo[height<=1080]*+bestaudio*/bestvideo+bestaudio/best";;
            "720") FORMAT="bestvideo[height<=720]+bestaudio/bestvideo[height<=720]*+bestaudio*/bestvideo+bestaudio/best";;
            "480") FORMAT="bestvideo[height<=480]+bestaudio/bestvideo[height<=480]*+bestaudio*/bestvideo+bestaudio/best";;
            *) FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
          esac
          
          download_video() {
            local METHOD=$1; local URL=$2; local TMP_DIR=$3;
            echo "Trying download method $METHOD..."
            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            elif [ "$QUALITY" = "best" ]; then
              COMMON_FLAGS="--merge-output-format mp4 --format-sort res,+codec:vp9.1,+size --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            else
              COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            fi
            case $METHOD in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github "$URL";;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              5) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android_vr" "$URL";;
              6) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL";;
              7) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              8) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" "$URL";;
            esac
          }
          
          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")
          get_random_word() { echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"; }
          
          get_unique_folder() {
            local BASE_PATH="$1"; local NAME="$2";
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_CHANNEL_DIR/$NAME" ]; then echo "$NAME"; return; fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_CHANNEL_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do RANDOM_SUFFIX=$(get_random_word); done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }
          
          # ── MAIN LOOP - پردازش هر ویدیو ────────────────────────────────
          VIDEO_INDEX=0
          while IFS= read -r VIDEO_URL; do
            VIDEO_INDEX=$((VIDEO_INDEX + 1))
            echo ""
            echo "============================================================"
            echo "Processing video $VIDEO_INDEX / $TOTAL_VIDEOS : $VIDEO_URL"
            echo "============================================================"
            
            TMP_DIR="tmp_downloads_${VIDEO_INDEX}"
            mkdir -p "$TMP_DIR"
            DOWNLOAD_SUCCESS=false
            
            # تلاش برای دانلود ویدیو
            for METHOD in 1 2 3 4 5 6 7 8; do
              if download_video $METHOD "$VIDEO_URL" "$TMP_DIR"; then
                echo "Download successful with method $METHOD!"
                QUALITY_OK=true
                if [ "$QUALITY" != "best" ] && [ "$QUALITY" != "audio" ]; then
                  for DOWNLOADED_FILE in "$TMP_DIR"/*.mp4 "$TMP_DIR"/*.webm "$TMP_DIR"/*.mkv; do
                    [ -f "$DOWNLOADED_FILE" ] || continue
                    ACTUAL_HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 "$DOWNLOADED_FILE" 2>/dev/null || echo "unknown")
                    if [ "$ACTUAL_HEIGHT" != "unknown" ] && [ "$ACTUAL_HEIGHT" -lt $(( QUALITY - 150 )) ] 2>/dev/null; then
                      echo "⚠️  Method $METHOD delivered ${ACTUAL_HEIGHT}p instead of ${QUALITY}p — rejecting..."
                      QUALITY_OK=false; rm -f "$DOWNLOADED_FILE";
                    fi
                  done
                fi
                if [ "$QUALITY_OK" = true ]; then DOWNLOAD_SUCCESS=true; break; fi
              else
                echo "Method $METHOD failed, waiting 3 seconds..."
                sleep 3
              fi
            done
            
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "❌ All download methods failed for video: $VIDEO_URL — skipping."
              rm -rf "$TMP_DIR"
              continue
            fi
            
            find "$TMP_DIR" -name "*.part" -delete
            
            for FILE in "$TMP_DIR"/*; do
              [ -f "$FILE" ] || continue
              if [[ "$FILE" == *.jpg ]] || [[ "$FILE" == *.webp ]]; then continue; fi
              
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              FILENAME_NO_EXT="${BASENAME%.*}"
              EXT="${BASENAME##*.}"
              FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")
              
              FINAL_FOLDER_NAME=$(get_unique_folder "$CHANNEL_DIR" "$FILENAME_NO_EXT")
              VIDEO_BACKUP_DIR="$BACKUP_CHANNEL_DIR/${FINAL_FOLDER_NAME}"
              mkdir -p "$VIDEO_BACKUP_DIR"
              
              THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
              if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then 
                cp "$THUMB_FILE" "$VIDEO_BACKUP_DIR/thumbnail.jpg"
              fi
              
              echo "${VIDEO_URL}|${FILENAME_NO_EXT}|${FINAL_FOLDER_NAME}" >> /tmp/video_info.txt
              FOLDER_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}")
              CHANNEL_ENCODED=$(urlencode "${CHANNEL_NAME}")
              
              if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
                ARCHIVE_BASE="$VIDEO_BACKUP_DIR/${FINAL_FOLDER_NAME}"
                if [ -n "$ZIP_PASSWORD" ]; then
                  7z a -tzip -v${SPLIT_MB}m -p"${ZIP_PASSWORD}" -mx=0 "${ARCHIVE_BASE}.zip" "$FILE"
                else
                  zip -0 -s ${SPLIT_MB}m "${ARCHIVE_BASE}.zip" "$FILE"
                fi
                PART_COUNT=$(ls "$VIDEO_BACKUP_DIR/"*.zip "$VIDEO_BACKUP_DIR/"*.z[0-9]* 2>/dev/null | wc -l)
                echo "Created $PART_COUNT parts"
                
                TOTAL_SIZE=0
                for part_file in "$VIDEO_BACKUP_DIR"/*; do
                  if [ -f "$part_file" ]; then
                    PART_SIZE=$(stat -c%s "$part_file")
                    TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                  fi
                done
                TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
                
                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                for part_file in $(ls "$VIDEO_BACKUP_DIR/"*.zip "$VIDEO_BACKUP_DIR/"*.z[0-9]* 2>/dev/null | sort -V); do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${CHANNEL_ENCODED}/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                  fi
                done
                
                MAIN_ZIP="${FINAL_FOLDER_NAME}.zip"
                
                README_FILE="$VIDEO_BACKUP_DIR/README.md"
                {
                  printf '%s\n' "# ${FILENAME_NO_EXT}"
                  printf '%s\n' ""
                  if [ -f "$VIDEO_BACKUP_DIR/thumbnail.jpg" ]; then
                    printf '%s\n' "<div align=\"center\">"
                    printf '%s\n' "  <picture>"
                    printf '%s\n' "    <img src=\"thumbnail.jpg\" width=\"250\" />"
                    printf '%s\n' "  </picture>"
                    printf '%s\n' "</div>"
                    printf '%s\n' ""
                    printf '%s\n' "<br>"
                    printf '%s\n' ""
                  fi
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Video Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                  printf '%s\n' "| **Channel** | \`${CHANNEL_NAME}\` |"
                  printf '%s\n' "| **Original Link** | [YouTube Video](${VIDEO_URL}) |"
                  printf '%s\n' "| **Total Size** | **${PART_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
                  printf '%s\n' "| **Quality** | **${QUALITY}** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Links"
                  printf '%s\n' ""
                  printf '%s\n' "> ⬇️ Download **all parts**, then open \`${MAIN_ZIP}\` — the other parts are found automatically."
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS_MD}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| OS | Steps |"
                    printf '%s\n' "|----|-------|"
                    printf '%s\n' "| **Windows** | Right-click \`${MAIN_ZIP}\` → *Extract Here* (needs [7-Zip](https://www.7-zip.org/) or WinRAR) → enter password |"
                    printf '%s\n' "| **Mac** | Open with [Keka](https://www.keka.io/) → enter password |"
                    printf '%s\n' "| **Linux** | \`unzip ${MAIN_ZIP}\` or right-click → Extract → enter password |"
                    printf '%s\n' "| **Android** | Use [ZArchiver](https://play.google.com/store/apps/details?id=ru.zdevs.zarchiver) → tap \`${MAIN_ZIP}\` → enter password |"
                  else
                    printf '%s\n' "| OS | Steps |"
                    printf '%s\n' "|----|-------|"
                    printf '%s\n' "| **Windows** | Double-click \`${MAIN_ZIP}\` — opens in Explorer, WinRAR, or 7-Zip automatically |"
                    printf '%s\n' "| **Mac** | Double-click \`${MAIN_ZIP}\` — extracts with Archive Utility or The Unarchiver |"
                    printf '%s\n' "| **Linux** | \`unzip ${MAIN_ZIP}\` or right-click → Extract Here (Ark/File Manager) |"
                    printf '%s\n' "| **Android** | Tap \`${MAIN_ZIP}\` in your file manager — or use [ZArchiver](https://play.google.com/store/apps/details?id=ru.zdevs.zarchiver) |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$README_FILE"
                
                echo "Created README.md"
              else
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -0 -P "${ZIP_PASSWORD}" "$VIDEO_BACKUP_DIR/${FINAL_FOLDER_NAME}.zip" "$FILE"
                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.zip")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${CHANNEL_ENCODED}/${FOLDER_ENCODED}/${FILE_ENCODED}"
                  
                  README_FILE="$VIDEO_BACKUP_DIR/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""
                    if [ -f "$VIDEO_BACKUP_DIR/thumbnail.jpg" ]; then
                      printf '%s\n' "<div align=\"center\">"
                      printf '%s\n' "  <picture>"
                      printf '%s\n' "    <img src=\"thumbnail.jpg\" width=\"250\" />"
                      printf '%s\n' "  </picture>"
                      printf '%s\n' "</div>"
                      printf '%s\n' ""
                      printf '%s\n' "<br>"
                      printf '%s\n' ""
                    fi
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Video Information"
                    printf '%s\n' ""
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    printf '%s\n' "| **Channel** | \`${CHANNEL_NAME}\` |"
                    printf '%s\n' "| **Original Link** | [YouTube Video](${VIDEO_URL}) |"
                    printf '%s\n' "| **Total Size** | **1 archive** - **${SIZE_MB} MB** |"
                    printf '%s\n' "| **Quality** | **${QUALITY}** |"
                    printf '%s\n' "| **Status** | **Complete (100%)** |"
                    printf '%s\n' "| **Password Protected** | **YES** |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Link"
                    printf '%s\n' ""
                    printf '%s\n' "| # | File | Link |"
                    printf '%s\n' "|---|------|------|"
                    printf '%s\n' "| 1 | \`${FINAL_FOLDER_NAME}.zip\` | [Download](${RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## How to Extract"
                    printf '%s\n' ""
                    printf '%s\n' "| OS | Steps |"
                    printf '%s\n' "|----|-------|"
                    printf '%s\n' "| **Windows** | Double-click \`${FINAL_FOLDER_NAME}.zip\` → enter password |"
                    printf '%s\n' "| **Mac** | Double-click → enter password (or use [The Unarchiver](https://theunarchiver.com/)) |"
                    printf '%s\n' "| **Linux** | \`unzip ${FINAL_FOLDER_NAME}.zip\` → enter password |"
                    printf '%s\n' "| **Android** | Tap the file in your file manager → enter password |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$README_FILE"
                  
                  echo "Created password-protected zip archive and README.md"
                else
                  cp "$FILE" "$VIDEO_BACKUP_DIR/${FINAL_FOLDER_NAME}.${EXT}"
                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.${EXT}")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${CHANNEL_ENCODED}/${FOLDER_ENCODED}/${FILE_ENCODED}"
                  
                  README_FILE="$VIDEO_BACKUP_DIR/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""
                    if [ -f "$VIDEO_BACKUP_DIR/thumbnail.jpg" ]; then
                      printf '%s\n' "<div align=\"center\">"
                      printf '%s\n' "  <picture>"
                      printf '%s\n' "    <img src=\"thumbnail.jpg\" width=\"250\" />"
                      printf '%s\n' "  </picture>"
                      printf '%s\n' "</div>"
                      printf '%s\n' ""
                      printf '%s\n' "<br>"
                      printf '%s\n' ""
                    fi
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Video Information"
                    printf '%s\n' ""
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    printf '%s\n' "| **Channel** | \`${CHANNEL_NAME}\` |"
                    printf '%s\n' "| **Original Link** | [YouTube Video](${VIDEO_URL}) |"
                    printf '%s\n' "| **Total Size** | **1 file** (no split) - **${SIZE_MB} MB** |"
                    printf '%s\n' "| **Quality** | **${QUALITY}** |"
                    printf '%s\n' "| **Status** | **Complete (100%)** |"
                    printf '%s\n' "| **Password Protected** | **NO** |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Link"
                    printf '%s\n' ""
                    printf '%s\n' "| # | File | Link |"
                    printf '%s\n' "|---|------|------|"
                    printf '%s\n' "| 1 | \`${FINAL_FOLDER_NAME}.${EXT}\` | [Download](${RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "Ready to use — no extraction needed!"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$README_FILE"
                  
                  echo "Copied file and created README.md"
                fi
              fi
            done
            rm -rf "$TMP_DIR"
            echo "✅ Video $VIDEO_INDEX/$TOTAL_VIDEOS completed: $FILENAME_NO_EXT"
          done < /tmp/channel_videos.txt
          
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          echo "REPO_OWNER_ENV=${REPO_OWNER_ENV}" > /tmp/env_vars.txt
          echo "REPO_NAME_ENV=${REPO_NAME_ENV}" >> /tmp/env_vars.txt
          echo "BRANCH_ENV=${BRANCH_ENV}" >> /tmp/env_vars.txt
          echo "CHANNEL_NAME=${CHANNEL_NAME}" >> /tmp/env_vars.txt
          
          echo ""
          echo "============================================================"
          echo "✅ ALL VIDEOS PROCESSED! Total: $VIDEO_INDEX / $TOTAL_VIDEOS"
          echo "============================================================"

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          set +e
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          source /tmp/env_vars.txt
          REPO_OWNER=${REPO_OWNER_ENV}
          REPO_NAME=${REPO_NAME_ENV}
          BRANCH=${BRANCH_ENV}
          CHANNEL_NAME=${CHANNEL_NAME}
          
          sub_download() {
            local MODE=$1; local OUT="$2"; local SURL="$3";
            local SUB_DIR=$(dirname "$OUT")
            sub_count() { find "$SUB_DIR" -type f \( -name "*.vtt" -o -name "*.srt" \) 2>/dev/null | wc -l; }
            fa_count()  { find "$SUB_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l; }
            en_count()  { find "$SUB_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l; }
            sub_flags() {
              case $MODE in
                all)        echo "--write-sub --sub-langs fa,en";;
                fa-native)  echo "--write-sub --sub-langs fa";;
                fa-auto)    echo "--write-auto-sub --sub-langs fa";;
                en-auto)    echo "--write-auto-sub --sub-langs en";;
                auto-both)  echo "--write-auto-sub --sub-langs en,fa";;
              esac
            }
            SFLAGS=$(sub_flags)
            COMMON_SUB="--sub-format vtt/srt/best --convert-subs vtt --skip-download --no-playlist --no-check-certificates --output ${OUT}"
            for METHOD in 1 2 3 4 5 6 7 8; do
              echo "  [subtitle] method $METHOD ..."
              case $METHOD in
                 1) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 2) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 3) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 4) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 5) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android_vr" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 6) yt-dlp --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 7) yt-dlp --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 8) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
              esac
              if [ "$MODE" = "fa-native" ] || [ "$MODE" = "fa-auto" ]; then
                [ "$(fa_count)" -gt 0 ] && { echo "  [subtitle] ✅ success with method $METHOD"; return 0; }
              elif [ "$MODE" = "en-auto" ]; then
                [ "$(en_count)" -gt 0 ] && { echo "  [subtitle] ✅ success with method $METHOD"; return 0; }
              elif [ "$MODE" = "auto-both" ]; then
                if [ "$(en_count)" -gt 0 ] && [ "$(fa_count)" -gt 0 ]; then
                  echo "  [subtitle] ✅ success with method $METHOD (both en+fa downloaded)"; return 0;
                fi
              else
                [ "$(sub_count)" -gt 0 ] && { echo "  [subtitle] ✅ success with method $METHOD"; return 0; }
              fi
              sleep 1
            done
            return 1
          }
          
          VIDEO_COUNT=0
          BACKUP_CHANNEL_DIR="$BACKUP_DIR/${CHANNEL_NAME}"
          
          while IFS='|' read -r VIDEO_URL VIDEO_NAME FOLDER_NAME; do
            VIDEO_COUNT=$((VIDEO_COUNT + 1))
            [ -z "$FOLDER_NAME" ] && continue
            
            echo ""
            echo "============================================================"
            echo "Downloading subtitles for video $VIDEO_COUNT: $VIDEO_NAME"
            echo "============================================================"
            
            SUBTITLE_DIR="$BACKUP_CHANNEL_DIR/${FOLDER_NAME}/subtitle"
            mkdir -p "$SUBTITLE_DIR"
            OUT_TMPL="${SUBTITLE_DIR}/%(title)s"
            
            sub_download "all" "$OUT_TMPL" "$VIDEO_URL" || true
            
            EN_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l)
            FA_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l)
            
            if [ "$EN_COUNT" -eq 0 ] || [ "$FA_COUNT" -eq 0 ]; then
              sub_download "auto-both" "$OUT_TMPL" "$VIDEO_URL" || true
            fi
            
            SUB_COUNT=$(find "$SUBTITLE_DIR" -type f 2>/dev/null | wc -l)
            if [ "$SUB_COUNT" -eq 0 ]; then
              echo "  (no subtitles available for this video)"
              rmdir "$SUBTITLE_DIR" 2>/dev/null || true
            else
              echo ""
              echo "→ Subtitle files downloaded ($SUB_COUNT file(s)):"
              find "$SUBTITLE_DIR" -type f 2>/dev/null | while read -r SUB_FILE; do
                echo "  • $(basename "$SUB_FILE")"
              done
              
              ZIP_PATH="$BACKUP_CHANNEL_DIR/${FOLDER_NAME}/subtitle.zip"
              echo ""
              echo "→ Zipping subtitles → subtitle.zip ..."
              
              if (cd "$SUBTITLE_DIR" && zip -j "$ZIP_PATH" ./* 2>&1); then
                rm -rf "$SUBTITLE_DIR"
                if [ -f "$ZIP_PATH" ]; then
                  ZIP_SIZE_MB=$(echo "scale=2; $(stat -c%s "$ZIP_PATH" 2>/dev/null || echo 0) / 1024 / 1024" | bc 2>/dev/null || echo "0.00")
                  echo "✅ subtitle.zip created (${ZIP_SIZE_MB} MB)"
                else
                  echo "⚠️  Failed to create subtitle.zip - continuing without subtitles"
                  rm -rf "$SUBTITLE_DIR" 2>/dev/null || true
                  continue
                fi
              else
                echo "⚠️  Zip command failed - continuing without subtitles"
                rm -rf "$SUBTITLE_DIR" 2>/dev/null || true
                continue
              fi
              
              CHANNEL_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$CHANNEL_NAME" 2>/dev/null || echo "$CHANNEL_NAME")
              FOLDER_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FOLDER_NAME" 2>/dev/null || echo "$FOLDER_NAME")
              SUB_ZIP_ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('subtitle.zip', safe=''))" 2>/dev/null || echo "subtitle.zip")
              SUB_RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${CHANNEL_ENCODED}/${FOLDER_ENCODED}/${SUB_ZIP_ENCODED}"
              
              README_FILE="$BACKUP_CHANNEL_DIR/${FOLDER_NAME}/README.md"
              if [ -f "$README_FILE" ]; then
                SUB_SECTION_FILE=$(mktemp 2>/dev/null || echo "/tmp/sub_section_$")
                if [ -n "$SUB_SECTION_FILE" ]; then
                  {
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## 🔤 Subtitles"
                    printf '%s\n' ""
                    printf '%s\n' "| # | File | Link |"
                    printf '%s\n' "|---|------|------|"
                    printf '%s\n' "| 1 | \`subtitle.zip\` | [Download](${SUB_RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "> Contains all available subtitle languages. Extract to get \`.vtt\` files."
                  } > "$SUB_SECTION_FILE" 2>/dev/null || true
                  
                  DOWNLOAD_LINE=$(grep -n "^## Download Link" "$README_FILE" 2>/dev/null | head -1 | cut -d: -f1)
                  if [ -n "$DOWNLOAD_LINE" ] && [ "$DOWNLOAD_LINE" -gt 0 ] 2>/dev/null; then
                    INSERT_AT=$((DOWNLOAD_LINE - 2))
                    if [ "$INSERT_AT" -lt 1 ]; then
                      INSERT_AT=$((DOWNLOAD_LINE - 1))
                    fi
                    if head -n "$INSERT_AT" "$README_FILE" > "${README_FILE}.tmp" 2>/dev/null; then
                      cat "$SUB_SECTION_FILE" >> "${README_FILE}.tmp" 2>/dev/null || true
                      printf '\n' >> "${README_FILE}.tmp" 2>/dev/null || true
                      tail -n "+$((INSERT_AT + 1))" "$README_FILE" >> "${README_FILE}.tmp" 2>/dev/null || true
                      mv "${README_FILE}.tmp" "$README_FILE" 2>/dev/null && echo "README patched with subtitle section." || echo "⚠️  README patch failed."
                    fi
                  else
                    cat "$SUB_SECTION_FILE" >> "$README_FILE" 2>/dev/null && echo "README appended with subtitle download link."
                  fi
                  rm -f "$SUB_SECTION_FILE" 2>/dev/null || true
                fi
              fi
            fi
          done < /tmp/video_info.txt
          
          echo ""
          echo "============================================================"
          echo "Subtitle download phase complete for $VIDEO_COUNT videos."
          echo "============================================================"
          set -e
          echo "✅ Subtitle step completed"
          exit 0

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Incremental Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          source /tmp/env_vars.txt
          REPO_OWNER=${REPO_OWNER_ENV}
          REPO_NAME=${REPO_NAME_ENV}
          CHANNEL_NAME=${CHANNEL_NAME}
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          
          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            echo "WARNING: No files in backup directory — all downloads may have failed."
            echo "Ensuring videos/ folder exists in repository..."
            
            git fetch origin "$BRANCH"
            git reset --hard origin/"$BRANCH"
            mkdir -p videos
            
            if [ ! -f "videos/README.md" ]; then
              {
                echo "# DOWNLOADED CHANNELS LIST"
                echo ""
                echo "----"
                echo ""
                echo "> No channels downloaded yet."
              } > videos/README.md
              git add -f videos/README.md
              if ! git diff --cached --quiet; then
                git commit -m "[AVASAM] Initialize videos folder [skip ci]"
                PUSH_RETRY=0
                while [ $PUSH_RETRY -lt 5 ]; do
                  PUSH_RETRY=$((PUSH_RETRY + 1))
                  if timeout 60 git push origin HEAD:"$BRANCH"; then
                    echo "videos/ folder initialized and pushed."
                    break
                  else
                    echo "Push failed, retry $PUSH_RETRY/5..."
                    sleep 3
                  fi
                done
              fi
            fi
            echo "No video files to push. Exiting."
            exit 0
          fi
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          regenerate_master_readme() {
            MASTER_README="videos/README.md"
            { echo "# 📺 DOWNLOADED CHANNELS"; echo ""; echo "----"; echo ""; } > "$MASTER_README"
            NUM=0
            for channel in videos/*/; do
              [ -d "$channel" ] || continue
              CHANNEL_FOLDER=$(basename "$channel")
              NUM=$((NUM + 1))
              CHANNEL_ENCODED=$(urlencode "$CHANNEL_FOLDER")
              CHANNEL_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${CHANNEL_ENCODED}"
              VIDEO_COUNT=$(find "$channel" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
              printf -- "- **%s** - 🎬 [%s](%s) - **%d videos**\n" "$NUM" "$CHANNEL_FOLDER" "$CHANNEL_LINK" "$VIDEO_COUNT" >> "$MASTER_README"
            done
            if [ $NUM -eq 0 ]; then
              echo "> No channels downloaded yet." >> "$MASTER_README"
            fi
          }
          
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/
          
          git add -f videos/
          regenerate_master_readme
          git add -f videos/README.md
          
          if ! git diff --cached --quiet; then
            git commit -m "[AVASAM] YouTube channel download: $CHANNEL_NAME [skip ci]"
            PUSH_RETRY=0
            while [ $PUSH_RETRY -lt 10 ]; do
              PUSH_RETRY=$((PUSH_RETRY + 1))
              if timeout 300 git push origin HEAD:"$BRANCH"; then
                echo "Push successful!"
                break
              else
                echo "Push failed, retry $PUSH_RETRY/10..."
                sleep 5
                git fetch origin "$BRANCH"
                git reset --hard origin/"$BRANCH"
                cp -r "$BACKUP_DIR"/* videos/
                git add -f videos/
                regenerate_master_readme
                git add -f videos/README.md
                git diff --cached --quiet || git commit -m "[AVASAM] YouTube channel download: $CHANNEL_NAME [skip ci]"
              fi
            done
          fi
          echo "=========================================="
          echo "All files pushed successfully!"
          echo "Channel: $CHANNEL_NAME"
          echo "made in AVASAM (https://avasam.ir)"
          echo "=========================================="
