name: 03 - 🎯 دانلود پلی‌لیست یوتیوب

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: '🔗 لینک پلی‌لیست یوتیوب'
        required: true
        type: string
      download_subtitles:
        description: '📝 زیرنویس ( فارسی و انگلیسی )'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز ( اختیاری برای محافظت )'
        required: false
        default: ''
        type: string

jobs:
  get-playlist:
    name: "📥 دانلود پلی‌لیست"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.playlist_url }}" ]; then
            echo "❌ No playlist URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15
          echo "Checking WARP status..."
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Playlist
        env:
          YT_PLAYLIST: ${{ github.event.inputs.playlist_url }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER_ENV: ${{ github.repository_owner }}
          REPO_NAME_ENV: ${{ github.event.repository.name }}
          BRANCH_ENV: ${{ github.ref_name }}
        run: |
          # ── SETUP ────────────────────────────────
          REPO_OWNER="${REPO_OWNER_ENV}"
          REPO_NAME="${REPO_NAME_ENV}"
          BRANCH="${BRANCH_ENV}"
          PLAYLIST_URL="${YT_PLAYLIST}"
          QUALITY="${YT_QUALITY}"
          ZIP_PASSWORD="${YT_PASSWORD}"
          SPLIT_MB=95
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          BACKUP_DIR="/tmp/playlist_backup_$$"
          mkdir -p "$BACKUP_DIR"
          mkdir -p videos
          > /tmp/video_info.txt

          echo "Playlist URL: $PLAYLIST_URL"
          echo "Quality: $QUALITY"

          # ── FUNCTIONS ────────────────────────────────
          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'
          }
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          case "$QUALITY" in
            "audio") FORMAT="bestaudio/bestaudio*/best";;
            "best") FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
            "2160"|"4k") FORMAT="bestvideo[height<=2160]+bestaudio/bestvideo[height<=2160]*+bestaudio*/bestvideo+bestaudio/best";;
            "1440"|"2k") FORMAT="bestvideo[height<=1440]+bestaudio/bestvideo[height<=1440]*+bestaudio*/bestvideo+bestaudio/best";;
            "1080") FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo[height<=1080]*+bestaudio*/bestvideo+bestaudio/best";;
            "720") FORMAT="bestvideo[height<=720]+bestaudio/bestvideo[height<=720]*+bestaudio*/bestvideo+bestaudio/best";;
            "480") FORMAT="bestvideo[height<=480]+bestaudio/bestvideo[height<=480]*+bestaudio*/bestvideo+bestaudio/best";;
            *) FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
          esac
          
          download_video() {
            local METHOD=$1; local URL=$2; local TMP_DIR=$3;
            echo "Trying download method $METHOD..."
            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --yes-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            elif [ "$QUALITY" = "best" ]; then
              COMMON_FLAGS="--merge-output-format mp4 --format-sort res,+codec:vp9.1,+size --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --yes-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            else
              COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --yes-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            fi
            case $METHOD in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github "$URL";;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              5) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android_vr" "$URL";;
              6) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL";;
              7) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              8) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" "$URL";;
            esac
          }
          
          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")
          get_random_word() { echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"; }
          
          get_unique_folder() {
            local BASE_PATH="$1"; local NAME="$2";
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then echo "$NAME"; return; fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do RANDOM_SUFFIX=$(get_random_word); done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          # ── GET PLAYLIST INFO ────────────────────────────────
          echo "============================================================"
          echo "Fetching playlist information..."
          echo "============================================================"
          
          PLAYLIST_ID=$(echo "$PLAYLIST_URL" | grep -oP '(?<=list=)[^&]+' || echo "$PLAYLIST_URL" | grep -oP 'PL[^?]+')
          
          echo "Extracting video URLs from playlist..."
          yt-dlp --proxy "socks5://127.0.0.1:1080" --flat-playlist --print "%(webpage_url)s" "$PLAYLIST_URL" > /tmp/playlist_urls.txt
          
          URL_LIST=()
          while IFS= read -r line; do
            [ -n "$line" ] && URL_LIST+=("$line")
          done < /tmp/playlist_urls.txt
          
          TOTAL_URLS=${#URL_LIST[@]}
          
          if [ $TOTAL_URLS -eq 0 ]; then
            echo "❌ No videos found in playlist!"
            exit 1
          fi
          
          echo "Found $TOTAL_URLS videos in playlist"
          
          PLAYLIST_NAME=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --flat-playlist --print "%(playlist_title)s" "$PLAYLIST_URL" 2>/dev/null | head -1)
          if [ -z "$PLAYLIST_NAME" ]; then
            PLAYLIST_NAME="playlist_${PLAYLIST_ID}"
          fi
          PLAYLIST_NAME=$(sanitize_name "$PLAYLIST_NAME")
          echo "Playlist Name: $PLAYLIST_NAME"

          # ── MAIN LOOP ────────────────────────────────
          URL_INDEX=0
          for URL in "${URL_LIST[@]}"; do
            URL_INDEX=$((URL_INDEX + 1))
            echo "============================================================"
            echo "Processing video $URL_INDEX / $TOTAL_URLS : $URL"
            echo "============================================================"
            TMP_DIR="tmp_downloads_${URL_INDEX}"
            mkdir -p "$TMP_DIR"
            DOWNLOAD_SUCCESS=false
            
            for METHOD in 1 2 3 4 5 6 7 8; do
              if download_video $METHOD "$URL" "$TMP_DIR"; then
                echo "Download successful with method $METHOD!"
                DOWNLOAD_SUCCESS=true
                break
              else
                echo "Method $METHOD failed, waiting 3 seconds..."
                sleep 3
              fi
            done
            
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "❌ All download methods failed for URL: $URL — skipping."
              rm -rf "$TMP_DIR"
              continue
            fi
            
            find "$TMP_DIR" -name "*.part" -delete
            for FILE in "$TMP_DIR"/*; do
              [ -f "$FILE" ] || continue
              if [[ "$FILE" == *.jpg ]] || [[ "$FILE" == *.webp ]]; then continue; fi
              
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              FILENAME_NO_EXT="${BASENAME%.*}"
              EXT="${BASENAME##*.}"
              FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")
              
              FINAL_FOLDER_NAME="${PLAYLIST_NAME}/${FILENAME_NO_EXT}"
              mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"
              
              THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
              if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then
                cp "$THUMB_FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg"
              fi
              
              echo "${FILENAME_NO_EXT}|${FINAL_FOLDER_NAME}|${URL}|${URL_INDEX}" >> /tmp/video_info.txt
              FOLDER_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}")
              
              if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
                ARCHIVE_BASE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FILENAME_NO_EXT}"
                if [ -n "$ZIP_PASSWORD" ]; then
                  7z a -tzip -v${SPLIT_MB}m -p"${ZIP_PASSWORD}" -mx=0 "${ARCHIVE_BASE}.zip" "$FILE" > /dev/null 2>&1
                else
                  zip -0 -s ${SPLIT_MB}m "${ARCHIVE_BASE}.zip" "$FILE" > /dev/null 2>&1
                fi
                
                PART_COUNT=$(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | wc -l)
                
                TOTAL_SIZE=0
                for part_file in "$BACKUP_DIR/${FINAL_FOLDER_NAME}"/*; do
                  if [ -f "$part_file" ]; then
                    PART_SIZE=$(stat -c%s "$part_file")
                    TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                  fi
                done
                TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
                
                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                for part_file in $(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | sort -V); do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                  fi
                done

                README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${FILENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "**Playlist:** ${PLAYLIST_NAME}"
                  printf '%s\n' "**Video #${URL_INDEX} of ${TOTAL_URLS}**"
                  printf '%s\n' ""

                  if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                    printf '%s\n' "<div align=\"center\">"
                    printf '%s\n' "  <picture>"
                    printf '%s\n' "    <img src=\"thumbnail.jpg\" width=\"250\" />"
                    printf '%s\n' "  </picture>"
                    printf '%s\n' "</div>"
                    printf '%s\n' ""
                    printf '%s\n' "<br>"
                    printf '%s\n' ""
                  fi

                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Video Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                  printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                  printf '%s\n' "| **Playlist** | ${PLAYLIST_NAME} |"
                  printf '%s\n' "| **Position** | ${URL_INDEX} / ${TOTAL_URLS} |"
                  printf '%s\n' "| **Total Size** | **${PART_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
                  printf '%s\n' "| **Quality** | **${QUALITY}** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Links"
                  printf '%s\n' ""
                  printf '%s\n' "> ⬇️ Download **all parts**, then open \`${FILENAME_NO_EXT}.zip\`"
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS_MD}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$README_FILE"

              else
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -0 -P "${ZIP_PASSWORD}" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FILENAME_NO_EXT}.zip" "$FILE" > /dev/null 2>&1
                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  FILE_ENCODED=$(urlencode "${FILENAME_NO_EXT}.zip")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"

                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""
                    printf '%s\n' "**Playlist:** ${PLAYLIST_NAME}"
                    printf '%s\n' "**Video #${URL_INDEX} of ${TOTAL_URLS}**"
                    printf '%s\n' ""

                    if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                      printf '%s\n' "<div align=\"center\">"
                      printf '%s\n' "  <picture>"
                      printf '%s\n' "    <img src=\"thumbnail.jpg\" width=\"250\" />"
                      printf '%s\n' "  </picture>"
                      printf '%s\n' "</div>"
                      printf '%s\n' ""
                      printf '%s\n' "<br>"
                      printf '%s\n' ""
                    fi

                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Video Information"
                    printf '%s\n' ""
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                    printf '%s\n' "| **Playlist** | ${PLAYLIST_NAME} |"
                    printf '%s\n' "| **Position** | ${URL_INDEX} / ${TOTAL_URLS} |"
                    printf '%s\n' "| **Total Size** | **1 archive** - **${SIZE_MB} MB** |"
                    printf '%s\n' "| **Quality** | **${QUALITY}** |"
                    printf '%s\n' "| **Status** | **Complete (100%)** |"
                    printf '%s\n' "| **Password Protected** | **YES** |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Link"
                    printf '%s\n' ""
                    printf '%s\n' "| # | File | Link |"
                    printf '%s\n' "|---|------|------|"
                    printf '%s\n' "| 1 | \`${FILENAME_NO_EXT}.zip\` | [Download](${RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$README_FILE"

                else
                  cp "$FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FILENAME_NO_EXT}.${EXT}"
                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  FILE_ENCODED=$(urlencode "${FILENAME_NO_EXT}.${EXT}")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"

                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""
                    printf '%s\n' "**Playlist:** ${PLAYLIST_NAME}"
                    printf '%s\n' "**Video #${URL_INDEX} of ${TOTAL_URLS}**"
                    printf '%s\n' ""

                    if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                      printf '%s\n' "<div align=\"center\">"
                      printf '%s\n' "  <picture>"
                      printf '%s\n' "    <img src=\"thumbnail.jpg\" width=\"250\" />"
                      printf '%s\n' "  </picture>"
                      printf '%s\n' "</div>"
                      printf '%s\n' ""
                      printf '%s\n' "<br>"
                      printf '%s\n' ""
                    fi

                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Video Information"
                    printf '%s\n' ""
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                    printf '%s\n' "| **Playlist** | ${PLAYLIST_NAME} |"
                    printf '%s\n' "| **Position** | ${URL_INDEX} / ${TOTAL_URLS} |"
                    printf '%s\n' "| **Total Size** | **1 file** - **${SIZE_MB} MB** |"
                    printf '%s\n' "| **Quality** | **${QUALITY}** |"
                    printf '%s\n' "| **Status** | **Complete (100%)** |"
                    printf '%s\n' "| **Password Protected** | **NO** |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Link"
                    printf '%s\n' ""
                    printf '%s\n' "| # | File | Link |"
                    printf '%s\n' "|---|------|------|"
                    printf '%s\n' "| 1 | \`${FILENAME_NO_EXT}.${EXT}\` | [Download](${RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$README_FILE"
                fi
              fi
            done
            rm -rf "$TMP_DIR"
          done
          
          # Create playlist master README
          PLAYLIST_README="$BACKUP_DIR/${PLAYLIST_NAME}/README.md"
          mkdir -p "$BACKUP_DIR/${PLAYLIST_NAME}"
          {
            printf '%s\n' "# 📺 ${PLAYLIST_NAME}"
            printf '%s\n' ""
            printf '%s\n' "**Original Playlist URL:** ${PLAYLIST_URL}"
            printf '%s\n' "**Total Videos:** ${TOTAL_URLS}"
            printf '%s\n' "**Quality:** ${QUALITY}"
            printf '%s\n' ""
            printf '%s\n' "---"
            printf '%s\n' ""
            printf '%s\n' "## 🎬 Videos in this Playlist"
            printf '%s\n' ""
            printf '%s\n' "| # | Video Name |"
            printf '%s\n' "|---|------------|"
            
            while IFS='|' read -r VID_NAME VID_FOLDER VID_URL VID_POS; do
              FOLDER_ENCODED=$(urlencode "${VID_FOLDER}")
              FOLDER_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${FOLDER_ENCODED}"
              printf '%s\n' "| ${VID_POS} | [${VID_NAME}](${FOLDER_LINK}) |"
            done < /tmp/video_info.txt
            
            printf '%s\n' ""
            printf '%s\n' "---"
            printf '%s\n' ""
            printf '%s\n' "*This playlist downloaded by [avasam.ir](https://avasam.ir)*"
          } > "$PLAYLIST_README"
          
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          echo "REPO_OWNER_ENV=${REPO_OWNER_ENV}" > /tmp/env_vars.txt
          echo "REPO_NAME_ENV=${REPO_NAME_ENV}" >> /tmp/env_vars.txt
          echo "BRANCH_ENV=${BRANCH_ENV}" >> /tmp/env_vars.txt
          echo "$PLAYLIST_URL" > /tmp/playlist_url.txt

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          set +e
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          source /tmp/env_vars.txt
          REPO_OWNER=${REPO_OWNER_ENV}
          REPO_NAME=${REPO_NAME_ENV}
          BRANCH=${BRANCH_ENV}

          sub_download() {
            local MODE=$1; local OUT="$2"; local SURL="$3";
            local SUB_DIR=$(dirname "$OUT")
            sub_count() { find "$SUB_DIR" -type f \( -name "*.vtt" -o -name "*.srt" \) 2>/dev/null | wc -l; }
            fa_count()  { find "$SUB_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l; }
            en_count()  { find "$SUB_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l; }
            sub_flags() {
              case $MODE in
                all)        echo "--write-sub --sub-langs fa,en";;
                fa-native)  echo "--write-sub --sub-langs fa";;
                fa-auto)    echo "--write-auto-sub --sub-langs fa";;
                en-auto)    echo "--write-auto-sub --sub-langs en";;
                auto-both)  echo "--write-auto-sub --sub-langs en,fa";;
              esac
            }
            SFLAGS=$(sub_flags)
            COMMON_SUB="--sub-format vtt/srt/best --convert-subs vtt --skip-download --yes-playlist --no-check-certificates --output ${OUT}"
            for METHOD in 1 2 3 4 5 6 7 8; do
              echo "  [subtitle] method $METHOD ..."
              case $METHOD in
                 1) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 2) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 3) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 4) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 5) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android_vr" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 6) yt-dlp --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 7) yt-dlp --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 8) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
              esac
              if [ "$MODE" = "fa-native" ] || [ "$MODE" = "fa-auto" ]; then
                [ "$(fa_count)" -gt 0 ] && { echo "  [subtitle] ✅ success with method $METHOD"; return 0; }
              elif [ "$MODE" = "en-auto" ]; then
                [ "$(en_count)" -gt 0 ] && { echo "  [subtitle] ✅ success with method $METHOD"; return 0; }
              elif [ "$MODE" = "auto-both" ]; then
                if [ "$(en_count)" -gt 0 ] && [ "$(fa_count)" -gt 0 ]; then
                  echo "  [subtitle] ✅ success with method $METHOD"; return 0;
                fi
              else
                [ "$(sub_count)" -gt 0 ] && { echo "  [subtitle] ✅ success with method $METHOD"; return 0; }
              fi
              sleep 1
            done
            return 1
          }

          while IFS='|' read -r ORIGINAL_NAME FOLDER_NAME VIDEO_URL VID_POS; do
            [ -z "$FOLDER_NAME" ] && continue
            SUBTITLE_DIR="$BACKUP_DIR/${FOLDER_NAME}/subtitle"
            mkdir -p "$SUBTITLE_DIR"
            OUT_TMPL="${SUBTITLE_DIR}/%(title)s"
            echo "Downloading subtitles for: $FOLDER_NAME"
            sub_download "all" "$OUT_TMPL" "$VIDEO_URL" || true
            
            EN_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l)
            FA_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l)
            if [ "$EN_COUNT" -eq 0 ] || [ "$FA_COUNT" -eq 0 ]; then
              sub_download "auto-both" "$OUT_TMPL" "$VIDEO_URL" || true
            fi
            
            SUB_COUNT=$(find "$SUBTITLE_DIR" -type f 2>/dev/null | wc -l)
            if [ "$SUB_COUNT" -eq 0 ]; then
              rmdir "$SUBTITLE_DIR" 2>/dev/null || true
            else
              ZIP_PATH="$BACKUP_DIR/${FOLDER_NAME}/subtitle.zip"
              (cd "$SUBTITLE_DIR" && zip -j "$ZIP_PATH" ./* 2>/dev/null)
              rm -rf "$SUBTITLE_DIR"
              
              if [ -f "$ZIP_PATH" ]; then
                FOLDER_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FOLDER_NAME" 2>/dev/null || echo "$FOLDER_NAME")
                SUB_RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/subtitle.zip"
                README_FILE="$BACKUP_DIR/${FOLDER_NAME}/README.md"
                if [ -f "$README_FILE" ]; then
                  echo "" >> "$README_FILE"
                  echo "---" >> "$README_FILE"
                  echo "## 🔤 Subtitles" >> "$README_FILE"
                  echo "" >> "$README_FILE"
                  echo "[Download subtitle.zip](${SUB_RAW_LINK})" >> "$README_FILE"
                fi
              fi
            fi
          done < /tmp/video_info.txt
          
          set -e
          exit 0

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Incremental Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          source /tmp/env_vars.txt
          REPO_OWNER=${REPO_OWNER_ENV}
          REPO_NAME=${REPO_NAME_ENV}
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            echo "No files to push. Exiting."
            exit 0
          fi

          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/ 2>/dev/null || true

          git add -f videos/
          
          if ! git diff --cached --quiet; then
            git commit -m "[AVASAM] YouTube playlist download [skip ci]"
            git push origin "HEAD:$BRANCH" || true
          fi
          
          echo "=========================================="
          echo "All files pushed successfully!"
          echo "made in AVASAM (https://avasam.ir)"
          echo "=========================================="
