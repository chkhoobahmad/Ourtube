name: 02 - 🎯 دانلود ویدئو یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو ( چند لینک با فاصله )'
        required: true
        type: string
      download_subtitles:
        description: '📝 زیرنویس ( فارسی و انگلیسی )'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: '1080'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز ( اختیاری برای محافظت )'
        required: false
        default: ''
        type: string

jobs:
  get-video:
    name: "📥 دانلود ویدیو"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "❌ No video URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15
          echo "Checking WARP status..."
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video(s)
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER_ENV: ${{ github.repository_owner }}
          REPO_NAME_ENV: ${{ github.event.repository.name }}
          BRANCH_ENV: ${{ github.ref_name }}
        run: |
          # ── SETUP ────────────────────────────────
          REPO_OWNER="${REPO_OWNER_ENV}"
          REPO_NAME="${REPO_NAME_ENV}"
          BRANCH="${BRANCH_ENV}"
          URLS_RAW="${YT_URLS}"
          read -ra URL_LIST <<< "$URLS_RAW"
          TOTAL_URLS=${#URL_LIST[@]}
          QUALITY="${YT_QUALITY}"
          ZIP_PASSWORD="${YT_PASSWORD}"
          DOWNLOAD_SUBS="${{ github.event.inputs.download_subtitles }}"
          SPLIT_MB=95
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR"
          mkdir -p videos
          > /tmp/video_info.txt

          echo "Total URLs to download: $TOTAL_URLS"
          echo "Quality: $QUALITY"

          # ── FUNCTIONS ────────────────────────────────
          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'
          }
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          # Force H.264 codec for all non-audio downloads
          case "$QUALITY" in
            "audio") 
              FORMAT="bestaudio/bestaudio*/best"
              ;;
            "best") 
              FORMAT="bestvideo[ext=mp4][vcodec^=avc1]+bestaudio[ext=m4a]/best[ext=mp4][vcodec^=avc1]/best"
              ;;
            "2160"|"4k") 
              FORMAT="bestvideo[height<=2160][ext=mp4][vcodec^=avc1]+bestaudio[ext=m4a]/bestvideo[height<=2160][ext=mp4][vcodec^=avc1]/best"
              ;;
            "1440"|"2k") 
              FORMAT="bestvideo[height<=1440][ext=mp4][vcodec^=avc1]+bestaudio[ext=m4a]/bestvideo[height<=1440][ext=mp4][vcodec^=avc1]/best"
              ;;
            "1080") 
              FORMAT="bestvideo[height<=1080][ext=mp4][vcodec^=avc1]+bestaudio[ext=m4a]/bestvideo[height<=1080][ext=mp4][vcodec^=avc1]/best"
              ;;
            "720") 
              FORMAT="bestvideo[height<=720][ext=mp4][vcodec^=avc1]+bestaudio[ext=m4a]/bestvideo[height<=720][ext=mp4][vcodec^=avc1]/best"
              ;;
            "480") 
              FORMAT="bestvideo[height<=480][ext=mp4][vcodec^=avc1]+bestaudio[ext=m4a]/bestvideo[height<=480][ext=mp4][vcodec^=avc1]/best"
              ;;
            *) 
              FORMAT="bestvideo[ext=mp4][vcodec^=avc1]+bestaudio[ext=m4a]/best[ext=mp4][vcodec^=avc1]/best"
              ;;
          esac
          
          # Common flags base (split to avoid length limit)
          BASE_FLAGS="--merge-output-format mp4 --remux-video mp4"
          BASE_FLAGS="$BASE_FLAGS --format-sort res,+codec:h264"
          BASE_FLAGS="$BASE_FLAGS --write-thumbnail --convert-thumbnails jpg"
          BASE_FLAGS="$BASE_FLAGS --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s"
          BASE_FLAGS="$BASE_FLAGS --no-part --no-playlist --retries 5"
          BASE_FLAGS="$BASE_FLAGS --fragment-retries 5 --no-check-certificates"
          BASE_FLAGS="$BASE_FLAGS --concurrent-fragments 8 --buffer-size 16K"
          BASE_FLAGS="$BASE_FLAGS --http-chunk-size 10M --progress --newline"
          
          download_video() {
            local METHOD=$1; local URL=$2; local TMP_DIR=$3;
            echo "Trying download method $METHOD..."
            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            else
              COMMON_FLAGS="$BASE_FLAGS"
            fi
            case $METHOD in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github "$URL";;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              5) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android_vr" "$URL";;
              6) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL";;
              7) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              8) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" "$URL";;
            esac
          }
          
          # Re-encode video to H.264 for Android Box compatibility
          reencode_for_android() {
            local INPUT_FILE=$1
            local OUTPUT_FILE="${INPUT_FILE%.*}_h264.mp4"
            
            echo "Re-encoding to H.264 for Android Box compatibility..."
            ffmpeg -i "$INPUT_FILE" \
              -c:v libx264 -profile:v high -level 4.0 -crf 23 \
              -preset fast -pix_fmt yuv420p -movflags +faststart \
              -c:a aac -b:a 192k -ar 48000 -y "$OUTPUT_FILE" 2>/dev/null
            
            if [ $? -eq 0 ] && [ -f "$OUTPUT_FILE" ]; then
              mv "$OUTPUT_FILE" "$INPUT_FILE"
              echo "Re-encoding successful!"
              return 0
            else
              echo "Warning: Re-encoding failed, keeping original file"
              rm -f "$OUTPUT_FILE"
              return 1
            fi
          }
          
          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")
          get_random_word() { echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"; }
          get_unique_folder() {
            local BASE_PATH="$1"; local NAME="$2";
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then echo "$NAME"; return; fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do RANDOM_SUFFIX=$(get_random_word); done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }
          normalize_youtube_url() {
            local INPUT_URL="$1"
            if [[ "$INPUT_URL" =~ youtu\.be/([a-zA-Z0-9_-]+) ]]; then
              VIDEO_ID="${BASH_REMATCH[1]}"; VIDEO_ID="${VIDEO_ID%%\?*}";
              echo "https://www.youtube.com/watch?v=${VIDEO_ID}"
            else
              echo "$INPUT_URL"
            fi
          }

          # ── MAIN LOOP ────────────────────────────────
          URL_INDEX=0
          for URL in "${URL_LIST[@]}"; do
            URL_INDEX=$((URL_INDEX + 1))
            URL=$(normalize_youtube_url "$URL")
            echo "============================================================"
            echo "Processing URL $URL_INDEX / $TOTAL_URLS : $URL"
            echo "============================================================"
            TMP_DIR="tmp_downloads_${URL_INDEX}"
            mkdir -p "$TMP_DIR"
            DOWNLOAD_SUCCESS=false
            for METHOD in 1 2 3 4 5 6 7 8; do
              if download_video $METHOD "$URL" "$TMP_DIR"; then
                echo "Download successful with method $METHOD!"
                
                # Check downloaded files and re-encode if needed
                for DOWNLOADED_FILE in "$TMP_DIR"/*.mp4 "$TMP_DIR"/*.webm "$TMP_DIR"/*.mkv; do
                  [ -f "$DOWNLOADED_FILE" ] || continue
                  
                  ACTUAL_CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of csv=p=0 "$DOWNLOADED_FILE" 2>/dev/null || echo "unknown")
                  
                  # Re-encode if not H.264
                  if [[ "$ACTUAL_CODEC" != "h264" ]] && [[ "$ACTUAL_CODEC" != "avc1"* ]]; then
                    echo "⚠️  File has codec $ACTUAL_CODEC, re-encoding to H.264..."
                    reencode_for_android "$DOWNLOADED_FILE"
                  else
                    # Add faststart for streaming
                    echo "Adding faststart flag for streaming..."
                    TEMP_FILE="${DOWNLOADED_FILE}.temp.mp4"
                    ffmpeg -i "$DOWNLOADED_FILE" -c copy -movflags +faststart -y "$TEMP_FILE" 2>/dev/null && mv "$TEMP_FILE" "$DOWNLOADED_FILE"
                  fi
                done
                
                DOWNLOAD_SUCCESS=true
                break
              else
                echo "Method $METHOD failed, waiting 3 seconds..."
                sleep 3
              fi
            done
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "❌ All download methods failed for URL: $URL — skipping."; rm -rf "$TMP_DIR"; continue;
            fi
            find "$TMP_DIR" -name "*.part" -delete
            for FILE in "$TMP_DIR"/*; do
              [ -f "$FILE" ] || continue
              if [[ "$FILE" == *.jpg ]] || [[ "$FILE" == *.webp ]]; then continue; fi
              SIZE=$(stat -c%s "$FILE"); BASENAME=$(basename "$FILE"); FILENAME_NO_EXT="${BASENAME%.*}"; EXT="${BASENAME##*.}";
              FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")
              FINAL_FOLDER_NAME=$(get_unique_folder "videos" "$FILENAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"
              THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
              if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then cp "$THUMB_FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg"; fi
              echo "${FILENAME_NO_EXT}|${FINAL_FOLDER_NAME}" >> /tmp/video_info.txt
              FOLDER_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}")
              if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
                ARCHIVE_BASE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}"
                if [ -n "$ZIP_PASSWORD" ]; then
                  7z a -tzip -v${SPLIT_MB}m -p"${ZIP_PASSWORD}" -mx=0 "${ARCHIVE_BASE}.zip" "$FILE"
                else
                  zip -0 -s ${SPLIT_MB}m "${ARCHIVE_BASE}.zip" "$FILE"
                fi
                PART_COUNT=$(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | wc -l)
                echo "Created $PART_COUNT parts"

                TOTAL_SIZE=0
                for part_file in "$BACKUP_DIR/${FINAL_FOLDER_NAME}"/*; do
                  if [ -f "$part_file" ]; then
                    PART_SIZE=$(stat -c%s "$part_file")
                    TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                  fi
                done
                TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                for part_file in $(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | sort -V); do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                  fi
                done

                MAIN_ZIP="${FINAL_FOLDER_NAME}.zip"

                README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${FILENAME_NO_EXT}"
                  printf '%s\n' ""
                  if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                    printf '%s\n' "<div align=\"center\"><picture><img src=\"thumbnail.jpg\" width=\"250\" /></picture></div>"
                    printf '%s\n' ""
                    printf '%s\n' "<br>"
                    printf '%s\n' ""
                  fi
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Video Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                  printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                  printf '%s\n' "| **Total Size** | **${PART_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
                  printf '%s\n' "| **Quality** | **${QUALITY}** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Links"
                  printf '%s\n' ""
                  printf '%s\n' "> ⬇️ Download **all parts**, then open \`${MAIN_ZIP}\`"
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS_MD}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$README_FILE"
                echo "Created README.md"
              else
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -0 -P "${ZIP_PASSWORD}" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.zip" "$FILE"
                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.zip")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"
                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""
                    if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                      printf '%s\n' "<div align=\"center\"><picture><img src=\"thumbnail.jpg\" width=\"250\" /></picture></div>"
                      printf '%s\n' ""
                    fi
                    printf '%s\n' "---"
                    printf '%s\n' "## Video Information"
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                    printf '%s\n' "| **Total Size** | **${SIZE_MB} MB** |"
                    printf '%s\n' "| **Quality** | **${QUALITY}** |"
                    printf '%s\n' "| **Password Protected** | **YES** |"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Link"
                    printf '%s\n' "| File | Link |"
                    printf '%s\n' "|------|------|"
                    printf '%s\n' "| \`${FINAL_FOLDER_NAME}.zip\` | [Download](${RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$README_FILE"
                  echo "Created password-protected zip archive"
                else
                  cp "$FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.${EXT}"
                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.${EXT}")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"
                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""
                    if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                      printf '%s\n' "<div align=\"center\"><picture><img src=\"thumbnail.jpg\" width=\"250\" /></picture></div>"
                      printf '%s\n' ""
                    fi
                    printf '%s\n' "---"
                    printf '%s\n' "## Video Information"
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                    printf '%s\n' "| **Total Size** | **${SIZE_MB} MB** |"
                    printf '%s\n' "| **Quality** | **${QUALITY}** |"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Link"
                    printf '%s\n' "| File | Link |"
                    printf '%s\n' "|------|------|"
                    printf '%s\n' "| \`${FINAL_FOLDER_NAME}.${EXT}\` | [Download](${RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$README_FILE"
                  echo "Copied file and created README.md"
                fi
              fi
            done
            rm -rf "$TMP_DIR"
          done
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          echo "REPO_OWNER_ENV=${REPO_OWNER_ENV}" > /tmp/env_vars.txt
          echo "REPO_NAME_ENV=${REPO_NAME_ENV}" >> /tmp/env_vars.txt
          echo "BRANCH_ENV=${BRANCH_ENV}" >> /tmp/env_vars.txt
          printf "%s\n" "${URL_LIST[@]}" > /tmp/yt_urls.txt

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          set +e
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          source /tmp/env_vars.txt
          REPO_OWNER=${REPO_OWNER_ENV}
          REPO_NAME=${REPO_NAME_ENV}
          BRANCH=${BRANCH_ENV}
          mapfile -t URL_LIST < /tmp/yt_urls.txt

          sub_download() {
            local MODE=$1; local OUT="$2"; local SURL="$3";
            local SUB_DIR=$(dirname "$OUT")
            sub_count() { find "$SUB_DIR" -type f \( -name "*.vtt" -o -name "*.srt" \) 2>/dev/null | wc -l; }
            fa_count()  { find "$SUB_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l; }
            en_count()  { find "$SUB_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l; }
            sub_flags() {
              case $MODE in
                all)        echo "--write-sub --sub-langs fa,en";;
                fa-native)  echo "--write-sub --sub-langs fa";;
                fa-auto)    echo "--write-auto-sub --sub-langs fa";;
                en-auto)    echo "--write-auto-sub --sub-langs en";;
                auto-both)  echo "--write-auto-sub --sub-langs en,fa";;
              esac
            }
            SFLAGS=$(sub_flags)
            COMMON_SUB="--sub-format vtt/srt/best --convert-subs vtt --skip-download --no-playlist --no-check-certificates --output ${OUT}"
            for METHOD in 1 2 3 4 5 6 7 8; do
              echo "  [subtitle] method $METHOD ..."
              case $METHOD in
                 1) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 2) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 3) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 4) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 5) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android_vr" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 6) yt-dlp --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 7) yt-dlp --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 8) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
              esac
              if [ "$MODE" = "fa-native" ] || [ "$MODE" = "fa-auto" ]; then
                [ "$(fa_count)" -gt 0 ] && { echo "  [subtitle] ✅ success with method $METHOD"; return 0; }
              elif [ "$MODE" = "en-auto" ]; then
                [ "$(en_count)" -gt 0 ] && { echo "  [subtitle] ✅ success with method $METHOD"; return 0; }
              elif [ "$MODE" = "auto-both" ]; then
                if [ "$(en_count)" -gt 0 ] && [ "$(fa_count)" -gt 0 ]; then
                  echo "  [subtitle] ✅ success with method $METHOD (both en+fa downloaded)"; return 0;
                fi
              else
                [ "$(sub_count)" -gt 0 ] && { echo "  [subtitle] ✅ success with method $METHOD"; return 0; }
              fi
              sleep 1
            done
            return 1
          }

          URL_INDEX=0
          while IFS='|' read -r ORIGINAL_NAME FOLDER_NAME; do
            URL_INDEX=$((URL_INDEX + 1)); URL="${URL_LIST[$((URL_INDEX - 1))]}";
            [ -z "$FOLDER_NAME" ] && continue
            SUBTITLE_DIR="$BACKUP_DIR/${FOLDER_NAME}/subtitle"; mkdir -p "$SUBTITLE_DIR";
            OUT_TMPL="${SUBTITLE_DIR}/%(title)s"
            echo "Downloading subtitles for: $FOLDER_NAME"
            sub_download "all" "$OUT_TMPL" "$URL" || true
            EN_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l)
            FA_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l)
            if [ "$EN_COUNT" -eq 0 ] || [ "$FA_COUNT" -eq 0 ]; then
              sub_download "auto-both" "$OUT_TMPL" "$URL" || true
            fi
            SUB_COUNT=$(find "$SUBTITLE_DIR" -type f 2>/dev/null | wc -l)
            if [ "$SUB_COUNT" -eq 0 ]; then
              echo "  (no subtitles available for this video)"
              rmdir "$SUBTITLE_DIR" 2>/dev/null || true
            else
              echo ""
              echo "→ Subtitle files downloaded ($SUB_COUNT file(s)):"
              find "$SUBTITLE_DIR" -type f 2>/dev/null | while read -r SUB_FILE; do
                echo "  • $(basename "$SUB_FILE")"
              done
              ZIP_PATH="$BACKUP_DIR/${FOLDER_NAME}/subtitle.zip"
              echo ""
              echo "→ Zipping subtitles → subtitle.zip ..."
              if (cd "$SUBTITLE_DIR" && zip -j "$ZIP_PATH" ./* 2>&1); then
                rm -rf "$SUBTITLE_DIR"
                if [ -f "$ZIP_PATH" ]; then
                  echo "✅ subtitle.zip created"
                fi
              fi
            fi
          done < /tmp/video_info.txt
          echo "✅ Subtitle step completed"
          exit 0

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Incremental Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          source /tmp/env_vars.txt
          REPO_OWNER=${REPO_OWNER_ENV}
          REPO_NAME=${REPO_NAME_ENV}
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            echo "WARNING: No files in backup directory — all downloads may have failed."
            git fetch origin "$BRANCH"
            git reset --hard origin/"$BRANCH"
            mkdir -p videos
            if [ ! -f "videos/README.md" ]; then
              echo "# DOWNLOADED VIDEOS LIST" > videos/README.md
              git add -f videos/README.md
              git commit -m "[AVASAM] Initialize videos folder [skip ci]" || true
              git push origin HEAD:"$BRANCH" || true
            fi
            exit 0
          fi

          urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }
          regenerate_master_readme() {
            MASTER_README="videos/README.md"
            echo "# DOWNLOADED VIDEOS LIST" > "$MASTER_README"
            echo "" >> "$MASTER_README"
            NUM=0
            for folder in videos/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue
              NUM=$((NUM + 1))
              FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
              echo "- $NUM - 🎬 [$FOLDER_NAME](https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${FOLDER_ENCODED})" >> "$MASTER_README"
            done
          }

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/
          git add -f videos/
          regenerate_master_readme
          git add -f videos/README.md
          if ! git diff --cached --quiet; then
            git commit -m "[AVASAM] YouTube download [skip ci]"
            for i in 1 2 3 4 5; do
              if git push origin HEAD:"$BRANCH"; then
                echo "Push successful!"
                break
              fi
              sleep 5
              git fetch origin "$BRANCH"
              git reset --hard origin/"$BRANCH"
              cp -r "$BACKUP_DIR"/* videos/
              git add -f videos/
              regenerate_master_readme
              git add -f videos/README.md
              git commit -m "[AVASAM] YouTube download [skip ci]" || true
            done
          fi
          echo "All files pushed successfully! made in AVASAM (https://avasam.ir)"
